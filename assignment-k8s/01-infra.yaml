apiVersion: v1
kind: Namespace
metadata:
  name: assignment
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: assignment
data:
  DB_HOST: "postgres-service.assignment.svc.cluster.local"
  DB_NAME: "company_db"
  DB_USER: "postgres_user"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: assignment
type: Opaque
data:
  # Base64 encoded password ('SuperSecurePass123') hidden from plain text
  DB_PASSWORD: U3VwZXJTZWN1cmVQYXNzMTIz
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: assignment
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi